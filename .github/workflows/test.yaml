name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: uxiew/action-setup-node-pnpm@main
        with:
          node-version: "24"
          args: "--frozen-lockfile"

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
