name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: uxiew/action-setup-node-pnpm@main
        with:
          node-version: "24"
          pnpm-version: "10.12.4"
          args: "--frozen-lockfile"

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  github-release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-npm:
    name: Publish Packages
    needs: verify
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js + pnpm
        uses: uxiew/action-setup-node-pnpm@main
        with:
          node-version: "24"
          pnpm-version: "10.12.4"
          args: "--frozen-lockfile"
          registry-url: "https://registry.npmjs.org"

      - name: Build
        run: pnpm build

      - name: Publish
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
          echo "@cmshiki:registry=https://registry.npmjs.org/" >> "$HOME/.npmrc"
          pnpm run publish

      - name: Skip publish (missing NPM_TOKEN)
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN is empty, skip npm publish."
